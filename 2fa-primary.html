<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two-factor Authentication - Bento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #FFF5E6; color: #111827; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { width: 100%; max-width: 420px; padding: 0 24px; }
  .card { background: #fff; border-radius: 16px; padding: 40px 32px; box-shadow: 0 4px 24px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.04); text-align: center; }
  .brand-icon { width: 48px; height: 48px; background: #FAD4C0; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 24px; color: #111827; }
  .brand-name { font-size: 14px; font-weight: 500; color: #80A1C1; letter-spacing: .03em; margin-bottom: 24px; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: #111827; }
  .desc { font-size: 14px; line-height: 1.6; color: #6b7280; max-width: 320px; margin: 0 auto 32px; }
  .field-group { text-align: left; margin-bottom: 8px; }
  .field-label { font-size: 14px; font-weight: 500; margin-bottom: 12px; display: block; color: #111827; }
  .code-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }
  .code-row input { width: 48px; height: 56px; text-align: center; font-size: 24px; font-weight: 600; font-family: 'JetBrains Mono', monospace; border: 2px solid #e5e7eb; border-radius: 10px; outline: none; background: #fff; color: #111827; transition: border-color .2s, box-shadow .2s; caret-color: #FAD4C0; }
  .code-row input:focus { border-color: #FAD4C0; box-shadow: 0 0 0 3px rgba(250,212,192,.25); }
  .helper { font-size: 12px; color: #9ca3af; margin-bottom: 28px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; background: #111827; color: #fff; border: none; border-radius: 10px; padding: 12px 24px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .2s, transform .1s; }
  .btn:hover { background: #1f2937; }
  .btn:active { transform: scale(.97); }
  .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  @media (max-width: 480px) {
    .card { padding: 32px 20px; }
    .code-row { gap: 6px; }
    .code-row input { width: 42px; height: 50px; font-size: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="brand-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div class="brand-name">SecureApp</div>
    <h1>Two-factor authentication</h1>
    <p class="desc">Open your authenticator app and enter the verification code displayed to complete sign-in.</p>
    <div class="field-group">
      <label class="field-label" for="code-0">Enter verification code</label>
      <div class="code-row" id="code-row">
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="code-0" autofocus aria-label="Digit 1">
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="code-1" aria-label="Digit 2">
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="code-2" aria-label="Digit 3">
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="code-3" aria-label="Digit 4">
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="code-4" aria-label="Digit 5">
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="code-5" aria-label="Digit 6">
      </div>
    </div>
    <p class="helper">A code was sent to your email and authenticator app</p>
    <button class="btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Verify
    </button>
  </div>
</div>

<div id="typeui-panel" style="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:2147483647;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;background:rgba(0,0,0,.5);color:#fff;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:9999px;font:500 14px/20px system-ui,sans-serif;box-shadow:0 10px 24px rgba(0,0,0,.25);white-space:nowrap">
  <a href="https://www.typeui.sh" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;gap:6px;text-decoration:none;color:inherit">
    <img src="https://www.typeui.sh/logo.svg" alt="TypeUI" style="width:18px;height:18px;flex-shrink:0">
  </a>
  <span id="typeui-label">TypeUI</span>
  <span style="width:1px;height:16px;background:rgba(255,255,255,.2);margin:0 4px"></span>
  <span style="font-size:12px;opacity:.8">5/100 MCP calls</span>
  <a href="https://www.typeui.sh/#pricing" target="_blank" rel="noopener noreferrer" style="font-size:12px;color:#FAD4C0;text-decoration:none;margin-left:2px">Upgrade to Pro for unlimited calls</a>
  <span style="width:1px;height:16px;background:rgba(255,255,255,.2);margin:0 4px"></span>
  <div style="display:flex;gap:4px">
    <button data-var="0" style="background:#FAD4C0;color:#111827;border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .2s">Primary</button>
    <button data-var="1" style="background:transparent;color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:400;cursor:pointer;transition:all .2s">Var 1</button>
    <button data-var="2" style="background:transparent;color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:400;cursor:pointer;transition:all .2s">Var 2</button>
  </div>
  <button id="minimize-typeui" aria-label="Minimize TypeUI panel" style="background:transparent;border:none;color:#fff;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;margin-left:4px" title="Minimize TypeUI panel">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<script>
  (function() {
    const inputs = document.querySelectorAll('#code-row input');
    inputs.forEach((input, i) => {
      input.addEventListener('input', function() {
        if (this.value.length === 1 && i < inputs.length - 1) inputs[i + 1].focus();
      });
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && this.value.length === 0 && i > 0) { inputs[i - 1].focus(); inputs[i - 1].value = ''; }
      });
      input.addEventListener('click', function() { this.select(); });
    });

    const panel = document.getElementById('typeui-panel');
    const minBtn = document.getElementById('minimize-typeui');
    const originalStyle = 'position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:2147483647;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;background:rgba(0,0,0,.5);color:#fff;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:9999px;font:500 14px/20px system-ui,sans-serif;box-shadow:0 10px 24px rgba(0,0,0,.25);white-space:nowrap';
    const collapsedStyle = 'position:fixed;right:24px;bottom:24px;left:auto;transform:none;z-index:2147483647;display:flex;align-items:center;justify-content:center;width:44px;height:44px;padding:0;background:rgba(0,0,0,.5);color:#fff;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:9999px;font:500 14px/20px system-ui,sans-serif;box-shadow:0 10px 24px rgba(0,0,0,.25);white-space:nowrap';
    let minimized = false;

    function showAllChildren() {
      Array.from(panel.children).forEach(function(child) {
        if (child !== minBtn && child.tagName !== 'BUTTON') child.style.display = '';
      });
    }

    function hideNonLogoChildren() {
      Array.from(panel.children).forEach(function(child) {
        if (child.tagName === 'A' && child.querySelector('img')) { return; }
        if (child !== minBtn) child.style.display = 'none';
      });
    }

    minBtn.addEventListener('click', function() {
      if (!minimized) {
        panel.style.cssText = collapsedStyle;
        hideNonLogoChildren();
        minBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
        minBtn.setAttribute('aria-label', 'Maximize TypeUI panel');
        minBtn.title = 'Maximize TypeUI panel';
        minimized = true;
      } else {
        panel.style.cssText = originalStyle;
        showAllChildren();
        minBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>';
        minBtn.setAttribute('aria-label', 'Minimize TypeUI panel');
        minBtn.title = 'Minimize TypeUI panel';
        minimized = false;
      }
    });

    document.querySelectorAll('[data-var]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var idx = this.getAttribute('data-var');
        if (idx === '0') window.location.href = '2fa-primary.html';
        else if (idx === '1') window.location.href = 'shell-toolbar-v1.html';
        else if (idx === '2') window.location.href = 'shell-sidebar-v2.html';
      });
    });

    var current = '0';
    document.querySelectorAll('[data-var]').forEach(function(btn) {
      if (btn.getAttribute('data-var') === current) {
        btn.style.background = '#FAD4C0';
        btn.style.color = '#111827';
        btn.style.fontWeight = '500';
      } else {
        btn.style.background = 'transparent';
        btn.style.color = 'rgba(255,255,255,.7)';
        btn.style.border = '1px solid rgba(255,255,255,.2)';
      }
    });
  })();
</script>
</body>
</html>
